<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzTd8-7goWkNJZvYDwRCnrDz9AgYfwEOD1OPdIUrie8TBv7M2Icxfuzf8zGqZzP-wkHSA/exec"; // ใส่ลิงก์เดิมของคุณ

    function recordTime(name, action) {
        const statusDiv = document.getElementById('status-message');
        
        statusDiv.className = "mt-6 text-sm font-medium text-amber-600 block";
        statusDiv.innerText = `กำลังขอพิกัด GPS และบันทึกข้อมูลของ ${name}...`;

        // ตรวจสอบว่าเครื่องรองรับการค้นหาพิกัดไหม
        if (!navigator.geolocation) {
            statusDiv.className = "mt-6 text-sm font-medium text-rose-600 block bg-rose-50 p-3 rounded-lg";
            statusDiv.innerText = "❌ เบราว์เซอร์ของคุณไม่รองรับการเช็คพิกัด GPS";
            return;
        }

        // เรียกเปิด GPS บนมือถือพนักงาน
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;

                // แพ็คข้อมูลส่งไปหลังบ้าน
                const data = {
                    name: name,
                    action: action,
                    latitude: userLat,
                    longitude: userLng
                };

                fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                })
                .then(() => {
                    statusDiv.className = "mt-6 text-sm font-medium text-emerald-600 block bg-emerald-50 p-3 rounded-lg";
                    statusDiv.innerText = `✔️ ส่งข้อมูลของ ${name} เรียบร้อยแล้ว! (ระบบตรวจสอบพิกัดอัตโนมัติ)`;
                    setTimeout(() => { statusDiv.classList.add('hidden'); }, 4000);
                })
                .catch(error => {
                    console.error('Error:', error);
                    statusDiv.className = "mt-6 text-sm font-medium text-rose-600 block bg-rose-50 p-3 rounded-lg";
                    statusDiv.innerText = `❌ เกิดข้อผิดพลาดทางระบบ`;
                });
            },
            (error) => {
                // กรณีพนักงานกดปฏิเสธไม่ยอมแชร์พิกัด GPS
                statusDiv.className = "mt-6 text-sm font-medium text-rose-600 block bg-rose-50 p-3 rounded-lg";
                statusDiv.innerText = "❌ บันทึกไม่สำเร็จ: กรุณากด 'อนุญาตให้เข้าถึงตำแหน่ง' (GPS) ก่อนใช้งาน";
            },
            { enableHighAccuracy: true, timeout: 10000 } // ตั้งค่าให้ใช้ GPS ความแม่นยำสูง
        );
    }
</script>
