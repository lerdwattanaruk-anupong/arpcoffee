<script>
        // วางลิงก์เว็บแอปตัวล่าสุดของคุณตรงนี้ (ลิงก์เดิมที่ลงท้ายด้วย /exec)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwjVDh3B0pJ5Kme9XPayBv234cEu_Xn5Skwo12q0YxPce0Z1sC3d7x0mCSRBZ8WjWj1fw/exec"; 

        function recordTime(name, action) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.className = "mt-6 text-sm font-medium text-amber-600 block bg-amber-50 p-3 rounded-lg";
            statusDiv.innerText = `กำลังบันทึกข้อมูลของ คุณ${name}...`;

            // ใช้วิธีแนบข้อมูลไปกับลิงก์ (GET Request) ทะลุกำแพง Google ได้แน่นอน
            const finalUrl = `${WEB_APP_URL}?name=${encodeURIComponent(name)}&action=${encodeURIComponent(action)}`;

            fetch(finalUrl)
            .then(response => response.json())
            .then(res => {
                if (res.result === "success") {
                    statusDiv.className = "mt-6 text-sm font-medium text-emerald-600 block bg-emerald-50 p-3 rounded-lg";
                    statusDiv.innerText = `✔️ บันทึก "${action}" ของคุณ${name} เรียบร้อยแล้ว!`;
                } else {
                    statusDiv.className = "mt-6 text-sm font-medium text-rose-600 block bg-rose-50 p-3 rounded-lg";
                    statusDiv.innerText = `❌ เกิดข้อผิดพลาดจากหลังบ้าน: ${res.error}`;
                }
                setTimeout(() => { statusDiv.classList.add('hidden'); }, 5000);
            })
            .catch(error => {
                console.error('Error:', error);
                statusDiv.className = "mt-6 text-sm font-medium text-rose-600 block bg-rose-50 p-3 rounded-lg";
                statusDiv.innerText = `❌ ไม่สามารถเชื่อมต่อกับ Google ได้`;
                setTimeout(() => { statusDiv.classList.add('hidden'); }, 5000);
            });
        }
    </script>
